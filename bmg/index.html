<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Library</title>
<style>
  /* ─── Reset & base ─────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #f4f5f7;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* ─── Header ────────────────────────────────────────────────── */
  .vl-header {
    background: var(--accent, #1a1a2e);
    color: #fff;
    padding: 20px 28px 18px;
    border-bottom: 3px solid var(--accent-light, #3a86ff);
  }
  .vl-header h1 {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: 0.01em;
  }
  .vl-header p {
    font-size: 0.82rem;
    opacity: 0.7;
    margin-top: 3px;
  }

  /* ─── Controls bar ──────────────────────────────────────────── */
  .vl-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    padding: 16px 28px;
    background: #fff;
    border-bottom: 1px solid #e2e5ea;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 6px rgba(0,0,0,.06);
  }

  .vl-search-wrap {
    position: relative;
    flex: 1 1 220px;
    min-width: 180px;
  }
  .vl-search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    opacity: 0.45;
    pointer-events: none;
  }
  .vl-search {
    width: 100%;
    padding: 8px 12px 8px 34px;
    border: 1px solid #d0d5dd;
    border-radius: 6px;
    font-size: 0.88rem;
    outline: none;
    transition: border-color .15s;
  }
  .vl-search:focus { border-color: var(--accent-light, #3a86ff); }

  .vl-filter {
    padding: 8px 12px;
    border: 1px solid #d0d5dd;
    border-radius: 6px;
    font-size: 0.88rem;
    background: #fff;
    outline: none;
    cursor: pointer;
    min-width: 130px;
    transition: border-color .15s;
  }
  .vl-filter:focus { border-color: var(--accent-light, #3a86ff); }

  .vl-sort {
    padding: 8px 12px;
    border: 1px solid #d0d5dd;
    border-radius: 6px;
    font-size: 0.88rem;
    background: #fff;
    outline: none;
    cursor: pointer;
    min-width: 140px;
  }

  .vl-reset {
    padding: 8px 14px;
    background: #f0f0f0;
    border: 1px solid #d0d5dd;
    border-radius: 6px;
    font-size: 0.82rem;
    cursor: pointer;
    color: #555;
    transition: background .15s;
    white-space: nowrap;
  }
  .vl-reset:hover { background: #e2e5ea; }

  .vl-count {
    font-size: 0.8rem;
    color: #888;
    white-space: nowrap;
    margin-left: auto;
  }

  /* ─── Grid ──────────────────────────────────────────────────── */
  .vl-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
    padding: 24px 28px;
  }

  /* ─── Card ──────────────────────────────────────────────────── */
  .vl-card {
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    display: flex;
    flex-direction: column;
    transition: transform .15s, box-shadow .15s;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
  }
  .vl-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 18px rgba(0,0,0,.13);
  }

  /* Thumbnail wrapper — 16:9 for landscape, 9:16 aspect for Shorts */
  .vl-thumb {
    position: relative;
    width: 100%;
    background: #111;
    overflow: hidden;
  }
  .vl-thumb.landscape { padding-top: 56.25%; }
  .vl-thumb.short     { padding-top: 56.25%; }

  .vl-thumb img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Play overlay */
  .vl-play {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0);
    transition: background .2s;
  }
  .vl-card:hover .vl-play { background: rgba(0,0,0,.25); }
  .vl-play svg {
    width: 48px;
    height: 48px;
    opacity: 0;
    transition: opacity .2s;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,.5));
  }
  .vl-card:hover .vl-play svg { opacity: 1; }

  /* Shorts badge */
  .vl-shorts-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: #ff0000;
    color: #fff;
    font-size: 0.68rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* Duration badge — bottom-right of thumbnail */
  .vl-duration {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(0,0,0,.78);
    color: #fff;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: 0.02em;
    pointer-events: none;
  }

  /* Copy URL button */
  .vl-copy-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    width: 100%;
    margin-top: 10px;
    padding: 10px 14px;
    background: var(--accent-light, #3a86ff);
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, transform .1s;
    text-decoration: none;
    letter-spacing: 0.01em;
  }
  .vl-copy-btn:hover  { background: var(--accent, #1a1a2e); }
  .vl-copy-btn:active { transform: scale(0.97); }
  .vl-copy-btn.copied {
    background: #188038;
    pointer-events: none;
  }
  .vl-copy-btn svg {
    width: 15px;
    height: 15px;
    flex-shrink: 0;
  }

  /* Card body */
  .vl-body {
    padding: 12px 14px 14px;
    display: flex;
    flex-direction: column;
    flex: 1;
    gap: 6px;
  }

  .vl-title {
    font-size: 0.9rem;
    font-weight: 600;
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .vl-desc {
    font-size: 0.78rem;
    color: #666;
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .vl-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 4px;
  }
  .vl-tag {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
    white-space: nowrap;
  }
  .vl-tag.brand      { background: #e8f0fe; color: #1a73e8; }
  .vl-tag.model      { background: #fce8e6; color: #d93025; }
  .vl-tag.technology { background: #e6f4ea; color: #188038; }

  .vl-date {
    font-size: 0.72rem;
    color: #aaa;
    margin-top: auto;
    padding-top: 6px;
  }

  /* ─── Empty / loading / error states ───────────────────────── */
  .vl-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: #999;
  }
  .vl-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
  .vl-state p     { font-size: 0.9rem; }

  /* ─── Responsive tweaks ─────────────────────────────────────── */
  @media (max-width: 600px) {
    .vl-controls { padding: 12px 14px; }
    .vl-grid     { padding: 16px 14px; gap: 14px; }
    .vl-header   { padding: 16px 14px; }
  }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════
     CONFIGURATION
     • For SharePoint deployment: set jsonUrl to your hosted
       JSON file URL and leave INLINE_DATA as null.
     • For local testing: paste your JSON array into
       INLINE_DATA (the jsonUrl is ignored when data is inline).
     ════════════════════════════════════════════════════ -->
<script>
  const CONFIG = {
    title:    "BMG Content Library",
    jsonUrl:  "https://s-one-video.github.io/content-library/bmg/videos.json",
    accent:      "#DA291C",   // header background color (hex)
    accentLight: "#000000",   // highlight / focus color  (hex)

    // ── Local testing only ───────────────────────────────────────
    // Paste your JSON array here to test without a server.
    // Set back to null before deploying to SharePoint.
    INLINE_DATA: null,
  };
</script>
<!-- ════════════════════════════════════════════════════ -->

<div id="vl-app">
  <div class="vl-header">
    <h1 id="vl-title"></h1>
    <p id="vl-subtitle"></p>
  </div>

  <div class="vl-controls">
    <div class="vl-search-wrap">
      <svg viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M9 3a6 6 0 100 12A6 6 0 009 3zM1 9a8 8 0 1114.32 4.906l3.387 3.387a1 1 0 01-1.414 1.414l-3.387-3.387A8 8 0 011 9z" clip-rule="evenodd"/>
      </svg>
      <input class="vl-search" id="vl-search" type="text" placeholder="Search titles and descriptions…" autocomplete="off">
    </div>

    <select class="vl-filter" id="vl-brand">
      <option value="">All Brands</option>
    </select>

    <select class="vl-filter" id="vl-model">
      <option value="">All Models</option>
    </select>

    <select class="vl-filter" id="vl-tech">
      <option value="">All Technologies</option>
    </select>

    <select class="vl-sort" id="vl-sort">
      <option value="newest">Newest First</option>
      <option value="oldest">Oldest First</option>
      <option value="az">Title A → Z</option>
      <option value="za">Title Z → A</option>
    </select>

    <button class="vl-reset" id="vl-reset">Clear Filters</button>

    <span class="vl-count" id="vl-count"></span>
  </div>

  <div class="vl-grid" id="vl-grid">
    <div class="vl-state">
      <div class="icon">⏳</div>
      <p>Loading videos…</p>
    </div>
  </div>
</div>

<script>
(function () {
  // Apply config
  document.documentElement.style.setProperty('--accent',       CONFIG.accent);
  document.documentElement.style.setProperty('--accent-light', CONFIG.accentLight);
  document.getElementById('vl-title').textContent    = CONFIG.title;
  document.getElementById('vl-subtitle').textContent = CONFIG.subtitle;

  let allVideos  = [];
  let filtered   = [];

  const grid      = document.getElementById('vl-grid');
  const searchEl  = document.getElementById('vl-search');
  const brandEl   = document.getElementById('vl-brand');
  const modelEl   = document.getElementById('vl-model');
  const techEl    = document.getElementById('vl-tech');
  const sortEl    = document.getElementById('vl-sort');
  const resetBtn  = document.getElementById('vl-reset');
  const countEl   = document.getElementById('vl-count');

  // ── Load data (inline takes priority over fetch) ───────────
  if (CONFIG.INLINE_DATA && Array.isArray(CONFIG.INLINE_DATA)) {
    allVideos = CONFIG.INLINE_DATA;
    populateFilters(allVideos);
    applyFilters();
  } else {
    fetch(CONFIG.jsonUrl)
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(data => {
        allVideos = data;
        populateFilters(data);
        applyFilters();
      })
      .catch(err => {
        grid.innerHTML = `
          <div class="vl-state">
            <div class="icon">⚠️</div>
            <p>Could not load video data.<br>
               <small style="color:#bbb">${err.message} — check the JSON URL in CONFIG.</small></p>
          </div>`;
      });
  }

  // ── Split comma-separated field into trimmed array ──────────
  function splitField(val) {
    if (!val) return [];
    return val.split(',').map(s => s.trim()).filter(Boolean);
  }

  // ── Populate filter dropdowns ───────────────────────────────
  function populateFilters(videos) {
    const brands = [...new Set(videos.flatMap(v => splitField(v.brand)))].sort();
    const models = [...new Set(videos.flatMap(v => splitField(v.model)))].sort();
    const techs  = [...new Set(videos.flatMap(v => splitField(v.technology)))].sort();

    brands.forEach(b => brandEl.insertAdjacentHTML('beforeend', `<option value="${esc(b)}">${esc(b)}</option>`));
    models.forEach(m => modelEl.insertAdjacentHTML('beforeend', `<option value="${esc(m)}">${esc(m)}</option>`));
    techs.forEach(t  => techEl.insertAdjacentHTML('beforeend',  `<option value="${esc(t)}">${esc(t)}</option>`));
  }

  // ── Event listeners ─────────────────────────────────────────
  searchEl.addEventListener('input',  applyFilters);
  brandEl.addEventListener('change',  applyFilters);
  modelEl.addEventListener('change',  applyFilters);
  techEl.addEventListener('change',   applyFilters);
  sortEl.addEventListener('change',   applyFilters);
  resetBtn.addEventListener('click', () => {
    searchEl.value = '';
    brandEl.value  = '';
    modelEl.value  = '';
    techEl.value   = '';
    sortEl.value   = 'newest';
    applyFilters();
  });

  // ── Filter + sort ────────────────────────────────────────────
  function applyFilters() {
    const q     = searchEl.value.trim().toLowerCase();
    const brand = brandEl.value;
    const model = modelEl.value;
    const tech  = techEl.value;
    const sort  = sortEl.value;

    filtered = allVideos.filter(v => {
      if (brand && !splitField(v.brand).includes(brand))      return false;
      if (model && !splitField(v.model).includes(model))      return false;
      if (tech  && !splitField(v.technology).includes(tech))  return false;
      if (q) {
        const haystack = `${v.title} ${v.description}`.toLowerCase();
        if (!haystack.includes(q)) return false;
      }
      return true;
    });

    filtered.sort((a, b) => {
      if (sort === 'newest') return (b.published || '').localeCompare(a.published || '');
      if (sort === 'oldest') return (a.published || '').localeCompare(b.published || '');
      if (sort === 'az')     return a.title.localeCompare(b.title);
      if (sort === 'za')     return b.title.localeCompare(a.title);
      return 0;
    });

    renderGrid(filtered);
  }

  // ── Render ───────────────────────────────────────────────────
  function renderGrid(videos) {
    countEl.textContent = `${videos.length} video${videos.length !== 1 ? 's' : ''}`;

    if (!videos.length) {
      grid.innerHTML = `
        <div class="vl-state">
          <div class="icon">🔍</div>
          <p>No videos match your search or filters.</p>
        </div>`;
      return;
    }

    grid.innerHTML = videos.map(v => cardHTML(v)).join('');
  }

  function cardHTML(v) {
    const isShort   = (v.format || '').toLowerCase() === 'short';
    const thumbType = isShort ? 'short' : 'landscape';
    // Use hqdefault for Shorts (better portrait crop), mqdefault for landscape
    const thumbUrl  = isShort
      ? `https://img.youtube.com/vi/${esc(v.id)}/hqdefault.jpg`
      : `https://img.youtube.com/vi/${esc(v.id)}/mqdefault.jpg`;

    const tags = [
      ...splitField(v.brand).map(b      => `<span class="vl-tag brand">${esc(b)}</span>`),
      ...splitField(v.model).map(m      => `<span class="vl-tag model">${esc(m)}</span>`),
      ...splitField(v.technology).map(t => `<span class="vl-tag technology">${esc(t)}</span>`),
    ].join('');

    const dateStr = v.published
      ? new Date(v.published).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' })
      : '';

    return `
      <a class="vl-card" href="${esc(v.url)}" target="_blank" rel="noopener noreferrer"
         title="${esc(v.title)}">
        <div class="vl-thumb ${thumbType}">
          <img src="${thumbUrl}" alt="${esc(v.title)}" loading="lazy">
          <div class="vl-play">
            <svg viewBox="0 0 68 48" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="68" height="48" rx="10" fill="rgba(0,0,0,.7)"/>
              <path d="M27 15l22 9-22 9V15z" fill="white"/>
            </svg>
          </div>
          ${isShort ? '<span class="vl-shorts-badge">Shorts</span>' : ''}
          ${v.duration ? `<span class="vl-duration">${esc(v.duration)}</span>` : ''}
        </div>
        <div class="vl-body">
          <div class="vl-title">${esc(v.title)}</div>
          ${v.description ? `<div class="vl-desc">${esc(v.description)}</div>` : ''}
          ${tags ? `<div class="vl-tags">${tags}</div>` : ''}
          ${dateStr ? `<div class="vl-date">${dateStr}</div>` : ''}
          <button class="vl-copy-btn" data-url="${esc(v.url)}" onclick="copyUrl(event, this)">
            <svg viewBox="0 0 20 20" fill="currentColor">
              <path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/>
              <path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"/>
            </svg>
            Copy Video Link
          </button>
        </div>
      </a>`;
  }

  // ── Copy URL handler (global so inline onclick can reach it) ─
  window.copyUrl = function(e, btn) {
    e.preventDefault();
    e.stopPropagation();
    const url = btn.getAttribute('data-url');
    navigator.clipboard.writeText(url).then(() => {
      btn.classList.add('copied');
      btn.innerHTML = `
        <svg viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 00-1.414 0L8 12.586 4.707 9.293a1 1 0 00-1.414 1.414l4 4a1 1 0 001.414 0l8-8a1 1 0 000-1.414z" clip-rule="evenodd"/>
        </svg>
        Copied!`;
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/>
            <path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"/>
          </svg>
          Copy Video Link`;
      }, 2000);
    });
  };

  // ── Utility ──────────────────────────────────────────────────
  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

})();
</script>
</body>
</html>
