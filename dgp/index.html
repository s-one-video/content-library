<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIGIPRINT SUPPLIES Video Library</title>
<link rel="icon" type="image/png" href="dgpicon.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  :root { --accent: #1a1a2e; --accent-light: #3a86ff; }

  body { background: #f4f5f7; }

  /* ─── Header ────────────────────────────────────────────────── */
  .vl-header {
    background: var(--accent);
    color: #fff;
    padding: 18px 24px 16px;
    border-bottom: 3px solid var(--accent-light);
  }
  .vl-header h1 { font-size: 1.3rem; font-weight: 700; margin: 0; }
  .vl-header p  { font-size: 0.82rem; opacity: .7; margin: 2px 0 0; }

  /* ─── Controls bar ──────────────────────────────────────────── */
  .vl-controls {
    position: sticky; top: 0; z-index: 1020;
    background: #fff;
    border-bottom: 1px solid #e2e5ea;
    box-shadow: 0 2px 6px rgba(0,0,0,.06);
    padding: 12px 20px;
  }
  .vl-controls .form-control:focus,
  .vl-controls .form-select:focus {
    border-color: var(--accent-light);
    box-shadow: 0 0 0 .2rem rgba(0,0,0,.08);
  }

  /* ─── Card ──────────────────────────────────────────────────── */
  .vl-card {
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    height: 100%;
    border-radius: 10px;
    background: #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    transition: transform .15s, box-shadow .15s;
    /* No overflow:hidden here — needed so description popup can escape */
  }
  .vl-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 18px rgba(0,0,0,.13);
    color: inherit;
  }

  /* ─── Thumbnail ─────────────────────────────────────────────── */
  .vl-thumb {
    position: relative;
    width: 100%;
    padding-top: 56.25%;
    background: #111;
    overflow: hidden;
    border-radius: 10px 10px 0 0;
  }
  .vl-thumb img {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
  }
  .vl-play {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0); transition: background .2s;
  }
  .vl-card:hover .vl-play { background: rgba(0,0,0,.25); }
  .vl-play svg {
    width: 48px; height: 48px; opacity: 0;
    transition: opacity .2s;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,.5));
  }
  .vl-card:hover .vl-play svg { opacity: 1; }

  .vl-shorts-badge {
    position: absolute; top: 8px; left: 8px;
    background: #ff0000; color: #fff;
    font-size: .68rem; font-weight: 700;
    padding: 2px 7px; border-radius: 4px;
    letter-spacing: .04em; text-transform: uppercase;
  }
  .vl-duration {
    position: absolute; bottom: 8px; right: 8px;
    background: rgba(0,0,0,.78); color: #fff;
    font-size: .72rem; font-weight: 600;
    padding: 2px 6px; border-radius: 4px;
    pointer-events: none;
  }

  /* ─── Card body ─────────────────────────────────────────────── */
  .vl-body {
    padding: 12px 14px 14px;
    display: flex; flex-direction: column; flex: 1; gap: 6px;
    border-radius: 0 0 10px 10px;
    background: #fff;
  }
  .vl-title {
    font-size: .9rem; font-weight: 600; line-height: 1.35;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }

  /* ─── Description + hover popup ─────────────────────────────── */
  .vl-desc-wrap { position: relative; }
  .vl-desc {
    font-size: .78rem; color: #666; line-height: 1.45;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
    cursor: default;
  }
  .vl-desc-popup {
    display: none;
    position: absolute;
    top: calc(100% - 2px); /* slight overlap eliminates the hover gap */
    left: -14px; right: -14px;
    background: #fff;
    border: 1px solid #d0d5dd;
    border-radius: 8px;
    padding: 10px 13px;
    box-shadow: 0 8px 28px rgba(0,0,0,.18);
    font-size: .78rem; color: #444; line-height: 1.6;
    max-height: 220px; overflow-y: auto;
    z-index: 500;
    white-space: normal;
  }
  .vl-desc-wrap:hover .vl-desc-popup { display: block; }

  /* Elevate the column so its popup renders above cards in the next row */
  .col:has(.vl-desc-wrap:hover) { position: relative; z-index: 100; }

  /* ─── Tags (Bootstrap badge overrides) ──────────────────────── */
  .vl-tag-brand    { background: #e8f0fe !important; color: #1a73e8 !important; }
  .vl-tag-product  { background: #fce8e6 !important; color: #d93025 !important; }
  .vl-tag-category { background: #e6f4ea !important; color: #188038 !important; }

  /* ─── Copy button ───────────────────────────────────────────── */
  .vl-copy-btn {
    background: #72c2ff !important;
    border-color: #72c2ff !important;
  }
  .vl-copy-btn:hover  { background: #57b2f7 !important; border-color: #57b2f7 !important; }
  .vl-copy-btn.copied { background: #188038 !important; border-color: #188038 !important; pointer-events: none; }

  /* ─── Date ──────────────────────────────────────────────────── */
  .vl-date { font-size: .72rem; color: #aaa; margin-top: auto; padding-top: 4px; }

  /* ─── Loading / empty / error states ───────────────────────── */
  .vl-state { text-align: center; padding: 60px 20px; color: #999; width: 100%; }
  .vl-state .icon { font-size: 2.5rem; margin-bottom: 10px; }

  @media (max-width: 576px) {
    .vl-controls { padding: 10px 12px; }
    .vl-header   { padding: 14px 16px; }
  }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════
     CONFIGURATION
     • For GitHub Pages: set jsonUrl to your hosted JSON URL, leave INLINE_DATA as null.
     • For local testing: paste your JSON array into INLINE_DATA.
     ════════════════════════════════════════════════════ -->
<script>
  const CONFIG = {
    title:    "DIGIPRINT Content Library",
    subtitle: "Browse the latest product videos, demos, and guides",
    jsonUrl:  "https://s-one-video.github.io/content-library/dgp/videos.json",
    accent:      "#4b6601",
    accentLight: "#8BBA09",
    INLINE_DATA: null,
  };
</script>
<!-- ════════════════════════════════════════════════════ -->

<div id="vl-app">

  <div class="vl-header">
    <h1 id="vl-title"></h1>
    <p id="vl-subtitle"></p>
  </div>

  <div class="vl-controls">
    <div class="d-flex flex-wrap align-items-center gap-2">

      <div class="position-relative" style="flex:1 1 200px;min-width:160px;max-width:300px;">
        <svg style="position:absolute;left:9px;top:50%;transform:translateY(-50%);width:15px;height:15px;opacity:.4;pointer-events:none" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M9 3a6 6 0 100 12A6 6 0 009 3zM1 9a8 8 0 1114.32 4.906l3.387 3.387a1 1 0 01-1.414 1.414l-3.387-3.387A8 8 0 011 9z" clip-rule="evenodd"/>
        </svg>
        <input class="form-control form-control-sm" id="vl-search" type="text"
               placeholder="Search titles and descriptions…" autocomplete="off"
               style="padding-left:30px;">
      </div>

      <select class="form-select form-select-sm" id="vl-brand" style="min-width:120px;max-width:170px;">
        <option value="">All Brands</option>
      </select>

      <select class="form-select form-select-sm" id="vl-product" style="min-width:130px;max-width:200px;">
        <option value="">All Products</option>
      </select>

      <select class="form-select form-select-sm" id="vl-category" style="min-width:140px;max-width:200px;">
        <option value="">All Categories</option>
      </select>

      <select class="form-select form-select-sm" id="vl-sort" style="min-width:130px;max-width:170px;">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
        <option value="az">Title A → Z</option>
        <option value="za">Title Z → A</option>
      </select>

      <button class="btn btn-sm btn-outline-secondary" id="vl-reset">Clear Filters</button>

      <span class="ms-auto text-muted" style="font-size:.8rem;white-space:nowrap" id="vl-count"></span>
    </div>
  </div>

  <div class="p-3">
    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4" id="vl-grid">
      <div class="vl-state"><div class="icon">⏳</div><p>Loading videos…</p></div>
    </div>
    <div id="vl-sentinel" style="display:none;justify-content:center;align-items:center;padding:24px;">
      <div class="spinner-border spinner-border-sm text-secondary" role="status">
        <span class="visually-hidden">Loading more videos…</span>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function () {
  document.documentElement.style.setProperty('--accent',       CONFIG.accent);
  document.documentElement.style.setProperty('--accent-light', CONFIG.accentLight);
  document.getElementById('vl-title').textContent    = CONFIG.title;
  document.getElementById('vl-subtitle').textContent = CONFIG.subtitle || '';

  let allVideos = [];
  let filtered  = [];
  const PAGE_SIZE = 35;
  let displayedCount = 0;
  let scrollObserver = null;

  const grid     = document.getElementById('vl-grid');
  const searchEl = document.getElementById('vl-search');
  const brandEl  = document.getElementById('vl-brand');
  const productEl  = document.getElementById('vl-product');
  const categoryEl = document.getElementById('vl-category');
  const sortEl   = document.getElementById('vl-sort');
  const resetBtn = document.getElementById('vl-reset');
  const countEl  = document.getElementById('vl-count');

  // ── Load data ───────────────────────────────────────────────
  if (CONFIG.INLINE_DATA && Array.isArray(CONFIG.INLINE_DATA)) {
    allVideos = CONFIG.INLINE_DATA;
    populateFilters(allVideos);
    applyFilters();
  } else {
    fetch(CONFIG.jsonUrl)
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(data => { allVideos = data; populateFilters(data); applyFilters(); })
      .catch(err => {
        grid.innerHTML = `
          <div class="vl-state">
            <div class="icon">⚠️</div>
            <p>Could not load video data.<br>
               <small class="text-muted">${err.message} — check the JSON URL in CONFIG.</small></p>
          </div>`;
      });
  }

  // ── Split comma-separated field ──────────────────────────────
  function splitField(val) {
    if (!val) return [];
    return val.split(',').map(s => s.trim()).filter(Boolean);
  }

  // ── Populate filter dropdowns ────────────────────────────────
  function populateFilters(videos) {
    const brands = [...new Set(videos.flatMap(v => splitField(v.brand)))].sort();
    const products   = [...new Set(videos.flatMap(v => splitField(v.product)))].sort();
    const categories = [...new Set(videos.flatMap(v => splitField(v.category)))].sort();
    brands.forEach(b     => brandEl.insertAdjacentHTML('beforeend',    `<option value="${esc(b)}">${esc(b)}</option>`));
    products.forEach(p   => productEl.insertAdjacentHTML('beforeend',  `<option value="${esc(p)}">${esc(p)}</option>`));
    categories.forEach(c => categoryEl.insertAdjacentHTML('beforeend', `<option value="${esc(c)}">${esc(c)}</option>`));
  }

  // ── Event listeners ──────────────────────────────────────────
  searchEl.addEventListener('input',  applyFilters);
  brandEl.addEventListener('change',  applyFilters);
  productEl.addEventListener('change',  applyFilters);
  categoryEl.addEventListener('change', applyFilters);
  sortEl.addEventListener('change',     applyFilters);
  resetBtn.addEventListener('click', () => {
    searchEl.value = brandEl.value = productEl.value = categoryEl.value = '';
    sortEl.value = 'newest';
    applyFilters();
  });

  // ── Filter + sort ─────────────────────────────────────────────
  function applyFilters() {
    const q     = searchEl.value.trim().toLowerCase();
    const brand = brandEl.value;
    const product  = productEl.value;
    const category = categoryEl.value;
    const sort  = sortEl.value;

    filtered = allVideos.filter(v => {
      if (brand && !splitField(v.brand).includes(brand))     return false;
      if (product  && !splitField(v.product).includes(product))   return false;
      if (category && !splitField(v.category).includes(category)) return false;
      if (q) {
        if (!`${v.title} ${v.description}`.toLowerCase().includes(q)) return false;
      }
      return true;
    });

    filtered.sort((a, b) => {
      if (sort === 'newest') return (b.published || '').localeCompare(a.published || '');
      if (sort === 'oldest') return (a.published || '').localeCompare(b.published || '');
      if (sort === 'az')     return a.title.localeCompare(b.title);
      if (sort === 'za')     return b.title.localeCompare(a.title);
      return 0;
    });

    renderGrid(filtered);
  }

  // ── Render ────────────────────────────────────────────────────
  function renderGrid(videos) {
    if (scrollObserver) { scrollObserver.disconnect(); scrollObserver = null; }
    displayedCount = 0;
    grid.innerHTML = '';

    if (!videos.length) {
      grid.innerHTML = `
        <div class="vl-state">
          <div class="icon">🔍</div>
          <p>No videos match your search or filters.</p>
        </div>`;
      document.getElementById('vl-sentinel').style.display = 'none';
      countEl.textContent = '';
      return;
    }

    const batch = videos.slice(0, PAGE_SIZE);
    grid.innerHTML = batch.map(v => cardHTML(v)).join('');
    displayedCount = batch.length;
    updateCount();
    setupScrollObserver(videos);
  }

  function updateCount() {
    if (!filtered.length) { countEl.textContent = ''; return; }
    if (displayedCount >= filtered.length) {
      countEl.textContent = `${filtered.length} video${filtered.length !== 1 ? 's' : ''}`;
    } else {
      countEl.textContent = `Showing ${displayedCount} of ${filtered.length} videos`;
    }
  }

  function setupScrollObserver(videos) {
    const sentinel = document.getElementById('vl-sentinel');
    if (displayedCount >= videos.length) {
      sentinel.style.display = 'none';
      return;
    }
    sentinel.style.display = 'flex';
    scrollObserver = new IntersectionObserver((entries) => {
      if (!entries[0].isIntersecting) return;
      const start = displayedCount;
      const end   = Math.min(displayedCount + PAGE_SIZE, videos.length);
      grid.insertAdjacentHTML('beforeend', videos.slice(start, end).map(v => cardHTML(v)).join(''));
      displayedCount = end;
      updateCount();
      if (displayedCount >= videos.length) {
        scrollObserver.disconnect();
        scrollObserver = null;
        sentinel.style.display = 'none';
      }
    }, { rootMargin: '300px' });
    scrollObserver.observe(sentinel);
  }

  function cardHTML(v) {
    const isShort  = (v.format || '').toLowerCase() === 'short';
    const thumbUrl    = isShort
      ? `https://img.youtube.com/vi/${esc(v.id)}/hqdefault.jpg`
      : `https://img.youtube.com/vi/${esc(v.id)}/maxresdefault.jpg`;
    const thumbFallback = isShort ? '' : `this.onerror=null;this.src='https://img.youtube.com/vi/${esc(v.id)}/mqdefault.jpg'`;

    const tags = [
      ...splitField(v.brand).map(b      => `<span class="badge rounded-pill vl-tag-brand">${esc(b)}</span>`),
      ...splitField(v.product).map(p  => `<span class="badge rounded-pill vl-tag-product">${esc(p)}</span>`),
      ...splitField(v.category).map(c => `<span class="badge rounded-pill vl-tag-category">${esc(c)}</span>`),
    ].join('');

    const dateStr = v.published
      ? new Date(v.published).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' })
      : '';

    return `
      <div class="col">
        <a class="vl-card" href="${esc(v.url)}" target="_blank" rel="noopener noreferrer">
          <div class="vl-thumb">
            <img src="${thumbUrl}" alt="${esc(v.title)}" loading="lazy" onerror="${thumbFallback}">
            <div class="vl-play">
              <svg viewBox="0 0 68 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="68" height="48" rx="10" fill="rgba(0,0,0,.7)"/>
                <path d="M27 15l22 9-22 9V15z" fill="white"/>
              </svg>
            </div>
            ${isShort ? '<span class="vl-shorts-badge">Shorts</span>' : ''}
            ${v.duration ? `<span class="vl-duration">${esc(v.duration)}</span>` : ''}
          </div>
          <div class="vl-body">
            <div class="vl-title">${esc(v.title)}</div>
            ${v.description ? `
              <div class="vl-desc-wrap">
                <div class="vl-desc">${esc(v.description)}</div>
                <div class="vl-desc-popup">${esc(v.description)}</div>
              </div>` : ''}
            ${tags ? `<div class="d-flex flex-wrap gap-1 mt-1">${tags}</div>` : ''}
            ${dateStr ? `<div class="vl-date">${dateStr}</div>` : ''}
            <button class="btn btn-sm w-100 vl-copy-btn d-flex align-items-center justify-content-center gap-2 mt-2"
                    data-url="${esc(v.url)}" onclick="copyUrl(event, this)">
              <svg viewBox="0 0 20 20" fill="currentColor" style="width:15px;height:15px;flex-shrink:0">
                <path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/>
                <path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"/>
              </svg>
              Copy Video Link
            </button>
          </div>
        </a>
      </div>`;
  }

  // ── Copy URL handler ─────────────────────────────────────────
  window.copyUrl = function(e, btn) {
    e.preventDefault();
    e.stopPropagation();
    navigator.clipboard.writeText(btn.getAttribute('data-url')).then(() => {
      btn.classList.add('copied');
      btn.innerHTML = `
        <svg viewBox="0 0 20 20" fill="currentColor" style="width:15px;height:15px">
          <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 00-1.414 0L8 12.586 4.707 9.293a1 1 0 00-1.414 1.414l4 4a1 1 0 001.414 0l8-8a1 1 0 000-1.414z" clip-rule="evenodd"/>
        </svg>
        Copied!`;
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `
          <svg viewBox="0 0 20 20" fill="currentColor" style="width:15px;height:15px">
            <path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/>
            <path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"/>
          </svg>
          Copy Video Link`;
      }, 2000);
    });
  };

  // ── Utility ───────────────────────────────────────────────────
  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

})();
</script>
</body>
</html>
